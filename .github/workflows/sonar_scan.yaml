name: Sonar Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    env:
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY != '' && vars.SONAR_PROJECT_KEY || secrets.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION != '' && vars.SONAR_ORGANIZATION || secrets.SONAR_ORGANIZATION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Sonar configuration
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "Missing SONAR_TOKEN. Configure it as a repository secret."
            exit 1
          fi

          if [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "Missing Sonar project key. Set SONAR_PROJECT_KEY as a repository variable or secret."
            exit 1
          fi

          if [ -z "$SONAR_ORGANIZATION" ]; then
            echo "Missing Sonar organization. Set SONAR_ORGANIZATION as a repository variable or secret."
            exit 1
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.sources=.
            -Dsonar.terraform.file.suffixes=.tf
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
